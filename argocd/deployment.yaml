apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twitter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MuhammadFarhanz/argocd-kubernetes-gitops.git
    targetRevision: HEAD
    path: apps/twitter
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: twitter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
